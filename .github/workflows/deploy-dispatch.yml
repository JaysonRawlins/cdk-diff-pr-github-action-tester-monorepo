name: deploy-dispatch
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy to
        required: true
        type: choice
        options:
          - development
          - production
      version:
        description: Assembly version to deploy (e.g., 1.3.4)
        required: true
        type: string
jobs:
  deploy-dev:
    name: Deploy dev (manual)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    environment: development
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      CI: "true"
    defaults:
      run:
        working-directory: infra
    if: github.event.inputs.environment == 'development'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --check-files --frozen-lockfile
      - name: Download versioned assembly
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm pack @JaysonRawlins/cdk-diff-pr-github-action-tester-monorepo@${{ github.event.inputs.version }} --registry=https://npm.pkg.github.com && tar -xzf *.tgz && mv package cdk.out
      - name: Notify Slack - Deploy Starting (dev)
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: 'text: "CDK Deploy starting for *dev* (wd: infra)"'
      - name: AWS Credentials
        id: creds
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          role-session-name: GitHubAction
          aws-region: us-east-2
      - name: Deploy dev
        id: deploy
        run: npx cdk deploy MonorepoTestStack-dev --require-approval never --app cdk.out
      - name: Notify Slack - Deploy Complete (dev)
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: 'text: "CDK Deploy completed for *dev* - outcome: ${{ steps.deploy.outcome }}"'
  deploy-prod:
    name: Deploy prod (manual)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    environment: production
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      CI: "true"
    defaults:
      run:
        working-directory: infra
    if: github.event.inputs.environment == 'production'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --check-files --frozen-lockfile
      - name: Download versioned assembly
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm pack @JaysonRawlins/cdk-diff-pr-github-action-tester-monorepo@${{ github.event.inputs.version }} --registry=https://npm.pkg.github.com && tar -xzf *.tgz && mv package cdk.out
      - name: Notify Slack - Deploy Starting (prod)
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: 'text: "CDK Deploy starting for *prod* (wd: infra)"'
      - name: AWS Credentials
        id: creds
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          role-session-name: GitHubAction
          aws-region: us-east-2
      - name: Deploy prod
        id: deploy
        run: npx cdk deploy MonorepoTestStack-prod --require-approval never --app cdk.out
      - name: Notify Slack - Deploy Complete (prod)
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: 'text: "CDK Deploy completed for *prod* - outcome: ${{ steps.deploy.outcome }}"'
