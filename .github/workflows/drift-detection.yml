# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

name: drift-detection
on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to check for drift ('all' to run every stack)
        required: false
        type: choice
        options:
          - all
          - MonorepoTestStack-dev
          - MonorepoTestStack-prod
jobs:
  drift-monorepoteststack-dev:
    name: Drift Detection - monorepoteststack-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    env:
      AWS_DEFAULT_REGION: us-east-2
      AWS_REGION: us-east-2
      DRIFT_DETECTION_OUTPUT: drift-results-monorepoteststack-dev.json
      STACK_ID: monorepoteststack-dev
      STACK_NAME: MonorepoTestStack-dev
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Skip (stack not selected)
        if: ${{ !(github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev') }}
        run: echo "Stack not selected; skipping drift detection for this job."
      - name: Checkout
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: actions/checkout@v5
      - name: Setup Node.js
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Install dependencies
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --frozen-lockfile || npm ci
      - name: Notify Slack - Drift Check Starting (monorepoteststack-dev)
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: 'text: "Drift detection starting for *monorepoteststack-dev* (wd: infra)"'
      - name: AWS Credentials
        id: creds
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          role-session-name: GitHubAction
          aws-region: us-east-2
      - name: Assume Drift Detection Role
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::590183750202:role/cdk-drift-workflow-iam-role
          role-chaining: true
          role-skip-session-tagging: true
          aws-region: us-east-2
          aws-access-key-id: ${{ steps.creds.outputs.aws-access-key-id }}
          aws-secret-access-key: ${{ steps.creds.outputs.aws-secret-access-key }}
          aws-session-token: ${{ steps.creds.outputs.aws-session-token }}
      - name: Detect drift
        id: drift
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        env:
          STACK_NAME: MonorepoTestStack-dev
          AWS_REGION: us-east-2
          DRIFT_DETECTION_OUTPUT: drift-results-monorepoteststack-dev.json
        run: |-
          set +e
          node ./node_modules/@jjrawlins/cdk-diff-pr-github-action/lib/bin/detect-drift.js
          status=$?
          if [ -f "$DRIFT_DETECTION_OUTPUT" ]; then echo "Results file created: $DRIFT_DETECTION_OUTPUT"; fi
          STACK_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].StackId' --output text 2>/dev/null || true)
          echo "stack-arn=$STACK_ARN" >> "$GITHUB_OUTPUT"
          exit $status
        continue-on-error: true
      - name: Upload results
        if: ${{ github.event_name == 'schedule' || !github.event.inputs.stack || github.event.inputs.stack == 'all' || github.event.inputs.stack == 'monorepoteststack-dev' || github.event.inputs.stack == 'MonorepoTestStack-dev' }}
        uses: actions/upload-artifact@v4
        with:
          name: drift-results-monorepoteststack-dev
          path: infra/drift-results-monorepoteststack-dev.json
          if-no-files-found: ignore
      - name: Create Issue on Drift
        id: issue
        if: always() && steps.drift.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |-
            const fs = require('fs');
            const resultsFile = 'infra/drift-results-monorepoteststack-dev.json';
            if (!fs.existsSync(resultsFile)) { console.log('No results file found'); return 'NO_RESULTS'; }
            const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'));
            const driftedStacks = results.filter(r => r.driftStatus === 'DRIFTED');
            if (driftedStacks.length === 0) { console.log('No drift detected'); return 'NO_DRIFT'; }
            const title = 'Drift Detected in monorepoteststack-dev';
            let body = '## Drift Detection Report\n\n' + '**Stack:** monorepoteststack-dev\n' + '**Region:** us-east-2\n' + '**Time:** ' + new Date().toISOString() + '\n\n';
            body += '### Summary\n';
            body += '- Total stacks checked: ' + results.length + '\n';
            body += '- Drifted stacks: ' + driftedStacks.length + '\n\n';
            body += '### Drifted Stacks\n';
            for (const s of driftedStacks) {
              const resources = s.driftedResources || [];
              body += '#### ' + s.stackName + '\n';
              body += '- Drifted resources: ' + resources.length + '\n';
              for (const r of resources) { body += '  - ' + r.logicalResourceId + ' (' + r.resourceType + ')\n'; }
              body += '\n';
            }
            body += '### Action Required\n' + 'Please review the drifted resources and either:\n1. Update the infrastructure code to match the actual state\n2. Restore the resources to match the expected state\n\n';
            body += `[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: ['drift-detection', 'monorepoteststack-dev'] });
            let issueNumber;
            if (issues.data.length === 0) {
              const created = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['drift-detection', 'monorepoteststack-dev'] });
              issueNumber = created.data.number;
            } else {
              const issue = issues.data[0];
              issueNumber = issue.number;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body });
            }
            return String(issueNumber ?? "");
      - name: Notify Slack - Drift Detected (monorepoteststack-dev)
        if: always() && steps.drift.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CDK_NOTIFICATIONS_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |-
            text: "** ${{ env.STACK_NAME }} ** has drifted!"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Stack:* ${{ env.STACK_NAME }} (region ${{ env.AWS_REGION }}) has drifted:exclamation:"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Stack ARN*\n${{ steps.drift.outputs.stack-arn }}"
                  - type: "mrkdwn"
                    text: "*Issue*\n<${{ github.server_url }}/${{ github.repository }}/issues/${{ steps.issue.outputs.result }}|#${{ steps.issue.outputs.result }}>"
