name: deploy
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  synth:
    name: Synthesize CDK application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      CI: "true"
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --check-files --frozen-lockfile
      - name: Synth
        run: npx cdk synth
      - name: Upload cloud assembly
        uses: actions/upload-artifact@v4
        with:
          name: cloud-assembly
          path: infra/cdk.out/
  publish-assets:
    name: Publish assets to AWS
    needs: synth
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      CI: "true"
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --check-files --frozen-lockfile
      - name: Download cloud assembly
        uses: actions/download-artifact@v5
        with:
          name: cloud-assembly
          path: infra/cdk.out/
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          role-session-name: GitHubAction
          aws-region: us-east-2
      - name: Publish assets
        run: for manifest in $(find cdk.out -name "*-assets.json"); do npx cdk-assets publish -p "$manifest"; done
      - name: Configure git identity
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create assembly package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          PKG_NAME="@JaysonRawlins/cdk-diff-pr-github-action-tester-monorepo"
          LATEST=$(npm view "$PKG_NAME" version --registry=https://npm.pkg.github.com 2>/dev/null || echo "0.0.0")
          echo '{"name":"@JaysonRawlins/cdk-diff-pr-github-action-tester-monorepo","publishConfig":{"registry":"https://npm.pkg.github.com"}}' | jq --arg v "$LATEST" '. + {version: $v}' > cdk.out/package.json
          cd cdk.out && npm version --no-git-tag-version patch
      - name: Publish assembly to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          cd cdk.out && npm publish --registry=https://npm.pkg.github.com
          VERSION=$(node -p "require('./package.json').version")
          echo "ASSEMBLY_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Tag and release assembly version
        run: |-
          git tag "v${ASSEMBLY_VERSION}"
          git push origin "v${ASSEMBLY_VERSION}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.ASSEMBLY_VERSION }}
          name: v${{ env.ASSEMBLY_VERSION }}
          body: |-
            Assembly `@JaysonRawlins/cdk-diff-pr-github-action-tester-monorepo@${{ env.ASSEMBLY_VERSION }}` published to GitHub Packages.

            Deploy manually:
            ```
            gh workflow run deploy-dispatch.yml -f environment=<env> -f version=${{ env.ASSEMBLY_VERSION }}
            ```
          generate_release_notes: true
  deploy-dev:
    name: Deploy dev
    needs: publish-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    environment: development
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      CI: "true"
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --check-files --frozen-lockfile
      - name: Download cloud assembly
        uses: actions/download-artifact@v5
        with:
          name: cloud-assembly
          path: infra/cdk.out/
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          role-session-name: GitHubAction
          aws-region: us-east-2
      - name: Deploy dev
        run: npx cdk deploy MonorepoTestStack-dev --require-approval never --app cdk.out
