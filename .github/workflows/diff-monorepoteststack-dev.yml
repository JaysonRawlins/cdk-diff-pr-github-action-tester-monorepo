name: diff-monorepoteststack-dev
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  diff:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
      packages: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
          scope: "@${{ github.repository_owner }}"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            echo "No lock file found (yarn.lock or package-lock.json)" && exit 1
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          aws-region: us-east-2
      - name: Create Changeset for MonorepoTestStack-dev
        id: create-changeset
        run: |-
          set -o pipefail
          yarn cdk deploy MonorepoTestStack-dev --no-execute --change-set-name MonorepoTestStack-dev --require-approval never

          # Look up real CF stack name from cdk.out manifest (authoritative source)
          CF_STACK_NAME=""
          for manifest in cdk.out/*/manifest.json cdk.out/manifest.json; do
            [ -f "$manifest" ] || continue
            name=$(jq -r --arg dp "MonorepoTestStack-dev" \
              '.artifacts | to_entries[] | select(.value.type == "aws:cloudformation:stack" and .value.displayName == $dp) | (.value.properties.stackName // .key)' \
              "$manifest")
            if [ -n "$name" ] && [ "$name" != "null" ]; then
              CF_STACK_NAME="$name"
              break
            fi
          done
          if [ -z "$CF_STACK_NAME" ]; then
            echo "Warning: Could not resolve CF stack name from cdk.out, falling back to sanitized name"
            CF_STACK_NAME="MonorepoTestStack-dev"
          fi
          echo "cf-stack-name=${CF_STACK_NAME}" >> "$GITHUB_OUTPUT"
      - id: creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891377240835:role/GitHubActionsOidcRoleDevOps
          aws-region: us-east-2
      - name: Assume CloudFormation Changeset Role
        id: changeset-role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183750202:role/cdk-diff-workflow-iam-role
          role-chaining: true
          role-skip-session-tagging: true
          aws-region: us-east-2
          aws-access-key-id: ${{ steps.creds.outputs.aws-access-key-id }}
          aws-secret-access-key: ${{ steps.creds.outputs.aws-secret-access-key }}
          aws-session-token: ${{ steps.creds.outputs.aws-session-token }}
      - name: Describe change set for MonorepoTestStack-dev
        env:
          NODE_PATH: ${{ github.workspace }}/infra/node_modules
          STACK_NAME: ${{ steps.create-changeset.outputs.cf-stack-name }}
          CHANGE_SET_NAME: MonorepoTestStack-dev
          GITHUB_COMMENT_URL: ${{ github.event.pull_request.comments_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx ts-node --transpile-only $GITHUB_WORKSPACE/.github/workflows/scripts/describe-cfn-changeset.ts
      - name: Delete changeset for MonorepoTestStack-dev
        run: aws cloudformation delete-change-set --change-set-name MonorepoTestStack-dev --stack-name "${{ steps.create-changeset.outputs.cf-stack-name }}" --region us-east-2
